name: "Cloud PC Setup (Windows / macOS)"
on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows
      CODE:
        description: "[Windows] Full headless CRD command (CMD version)"
        required: false
        default: ""
      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"
      MAC_PASS:
        description: "[macOS] Permanent RustDesk Password"
        required: false
        default: "CloudPC123!"

concurrency:
  group: cloud-pc-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # WINDOWS JOB (Unchanged)
  # ==========================================
  windows-crd-setup:
    name: "🚀 Windows 2022 CRD Runner"
    if: github.event.inputs.os_choice == 'Windows'
    runs-on: windows-2022
    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: "🛑 Verify Inputs"
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAW_CODE)) {
            Write-Error "❌ Missing CRD Code!"
            exit 1
          }
      - name: "🔊 Enable Audio"
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv
      - name: "🔧 Install CRD & Virtual Audio"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          if (-not (Test-Path $userDownloads)) { New-Item -ItemType Directory -Path $userDownloads | Out-Null }
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi" -UseBasicParsing
          Invoke-WebRequest -Uri "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack45.zip" -OutFile "$userDownloads\VBCABLE.zip" -UseBasicParsing
          Expand-Archive -Path "$userDownloads\VBCABLE.zip" -DestinationPath "$userDownloads\VBCABLE" -Force
          Start-Process -Wait -FilePath "$userDownloads\VBCABLE\VBCABLE_Setup_x64.exe" -ArgumentList "-i", "-h" -Verb RunAs
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"
      - name: "🕵️‍♂️ Silent Install & Launch MostLogin"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          $mlInstaller = "$userDownloads\MostLogin-setup.exe"
          Invoke-WebRequest -Uri "https://downsoft.mostlogin.com/MostLogin-setup.exe" -OutFile $mlInstaller -UseBasicParsing
          Start-Process -FilePath $mlInstaller -ArgumentList "/S" -Wait
          $mlPath = "C:\Program Files (x86)\MostLogin\MostLogin.exe"
          if (Test-Path $mlPath) { Start-Process -FilePath $mlPath } else {
              $altPath = "$env:LocalAppData\Programs\MostLogin\MostLogin.exe"
              if (Test-Path $altPath) { Start-Process -FilePath $altPath }
          }
      - name: "🌟 Start Chrome Remote Desktop"
        run: |
          cmd.exe /c "$env:RAW_CODE --pin=$env:PIN_INPUT"
      - name: "⏳ Keep Alive"
        run: |
          Write-Host "✅ Windows PC Ready."
          while ($true) { Start-Sleep -Seconds 300 }

  # ==========================================
  # MACOS JOB (Fixed Permanent Password Bypass)
  # ==========================================
  macos-setup:
    name: "🍏 macOS Remote Runner"
    if: github.event.inputs.os_choice == 'macOS'
    runs-on: macos-15
    env:
      MAC_PASS: ${{ github.event.inputs.MAC_PASS }}
    steps:
      - name: "🔓 Create Admin"
        run: sudo sysadminctl -addUser macadmin -fullName "Mac Admin" -password "CloudPC123!" -admin
      - name: "🚫 System Prep"
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          curl -L -o /Users/runner/wallpaper.jpg "https://images.unsplash.com/photo-1506744626753-dba37c2a9816?q=80&w=2560"
          osascript -e 'tell application "Finder" to set desktop picture to POSIX file "/Users/runner/wallpaper.jpg"'
      - name: "🖥️ Install Remote Tools"
        run: |
          brew install --cask --no-quarantine rustdesk
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg
          sudo hdiutil attach /tmp/crd.dmg -nobrowse
          sudo installer -pkg $(find /Volumes/Chrome\ Remote\ Desktop* -name "*.pkg") -target /
          sudo hdiutil detach /Volumes/Chrome\ Remote\ Desktop* -force
      - name: "🚀 Configure RustDesk Daemon & Password"
        run: |
          # 1. Start the system-level RustDesk service first so it can register the password
          sudo /Applications/RustDesk.app/Contents/MacOS/RustDesk --service &
          
          # 2. Give the daemon plenty of time to build config files in the background
          sleep 15
          
          # 3. Apply the password via root execution
          sudo /Applications/RustDesk.app/Contents/MacOS/RustDesk --password "${{ env.MAC_PASS }}"
          
          # 4. Extract the RustDesk ID locally from the CLI (no screenshot needed!)
          RUSTDESK_ID=$(sudo /Applications/RustDesk.app/Contents/MacOS/RustDesk --get-id)
          echo "RUST_ID=$RUSTDESK_ID" >> $GITHUB_ENV
          
          # 5. Open the GUI application to bring it to the foreground
          open /Applications/RustDesk.app
          sleep 10
      - name: "⏳ Connection Window"
        run: |
          echo "============================================================"
          echo "✅ RUSTDESK IS CONFIGURED AND RUNNING"
          echo "🔑 Permanent Password: ${{ env.MAC_PASS }}"
          echo "🆔 RustDesk ID: ${{ env.RUST_ID }}"
          echo "============================================================"
          while true; do sleep 3600; done
