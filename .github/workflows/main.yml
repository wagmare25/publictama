name: "macOS RustDesk - Direct ID & Password"

on:
  workflow_dispatch:
    inputs:
      RUSTDESK_PASSWORD:
        description: "Set a custom RustDesk password"
        default: "password123"
        required: true

jobs:
  rustdesk:
    name: "🦀 Pure RustDesk"
    runs-on: macos-15

    steps:
      - name: "🦀 Install RustDesk & Google Chrome"
        run: |
          brew install --cask rustdesk google-chrome
          echo "✅ RustDesk and Google Chrome installed"

      - name: "🖥️ Install Chrome Remote Desktop"
        run: |
          echo "Downloading Chrome Remote Desktop..."
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg
          
          echo "Mounting DMG..."
          sudo hdiutil attach /tmp/crd.dmg -nobrowse
          
          echo "Installing Package..."
          PKG_PATH=$(find /Volumes/Chrome\ Remote\ Desktop* -name "*.pkg" | head -n 1)
          sudo installer -pkg "$PKG_PATH" -target /
          
          echo "Unmounting DMG..."
          sudo hdiutil detach /Volumes/Chrome\ Remote\ Desktop* -force
          
          echo "✅ Chrome Remote Desktop installed successfully"

      - name: "🔓 Grant Screen Recording & Accessibility Permissions"
        run: |
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          
          # Define the specific internal Bundle IDs for the apps
          RUSTDESK="com.carriez.rustdesk"
          CRD_ASSIST="com.google.chrome.remote_desktop.remote-assistance-host-v2"
          CRD_HOST="com.google.chromeremotedesktop.me2me-host"
          
          # Inject bypasses for both Screen Capture and Accessibility into the macOS TCC Database
          SQL_QUERY="
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$RUSTDESK', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$RUSTDESK', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$CRD_ASSIST', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$CRD_ASSIST', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$CRD_HOST', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$CRD_HOST', 0, 2, 4, 1, 0);
          "
          
          sudo sqlite3 "$TCC_DB" "$SQL_QUERY"
          echo "✅ Permissions injected into TCC.db for RustDesk and Chrome Remote Desktop"

      - name: "🖥️ Initialize Virtual Display"
        run: |
          # Force the window server to recognize a display resolution
          sudo defaults write /Library/Preferences/com.apple.windowserver.plist DisplayResolutionEnabled -bool YES
          echo "✅ Virtual display settings initialized"

      - name: "🚀 Start RustDesk"
        run: |
          # Find the app path
          RUSTDESK_APP=$(find /Applications -name "RustDesk.app" -type d | head -1)
          
          # Launch the GUI
          open "$RUSTDESK_APP"
          
          # Set the password via the command line utility
          "$RUSTDESK_APP/Contents/MacOS/rustdesk" --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          
          echo "✅ RustDesk started with custom password"

      - name: "📸 Capture ID & Password"
        run: |
          echo "⏳ Waiting 20s for RustDesk to generate ID..."
          sleep 20
          
          # Take a screenshot of the whole desktop
          screencapture -x /tmp/rustdesk-id.png
          
          if [ -f "/tmp/rustdesk-id.png" ]; then
            echo "✅ Screenshot captured successfully"
          else
            echo "❌ Failed to take screenshot"
            exit 1
          fi

      - name: "🌐 Upload Screenshot to Cloud (Direct Link)"
        run: |
          echo "Uploading screenshot to free hosting..."
          # Using Catbox.moe for a direct, anonymous image URL
          IMAGE_URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/rustdesk-id.png" https://catbox.moe/user/api.php)
          
          if [[ $IMAGE_URL == http* ]]; then
            echo "✅ Upload successful!"
            echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV
          else
            echo "❌ Upload failed. Falling back to Artifacts."
            echo "IMAGE_URL=Upload failed, please download the artifact zip from the Summary page." >> $GITHUB_ENV
          fi

      - name: "📋 Upload Credentials (Backup)"
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-credentials
          path: /tmp/rustdesk-id.png
          retention-days: 1

      - name: "⏳ Connection Window"
        run: |
          echo "🚀 STATUS: READY TO CONNECT!"
          echo "------------------------------------------------------"
          echo "📸 VIEW YOUR RUSTDESK ID HERE: ${{ env.IMAGE_URL }}"
          echo "🔑 Your Password is: ${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          echo "------------------------------------------------------"
          echo "Note: Once connected via RustDesk, open Google Chrome to finish setting up Chrome Remote Desktop."
          
          # Keep the runner alive infinitely (GitHub will naturally terminate it at the max limit)
          while true; do sleep 3600; done
