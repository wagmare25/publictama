name: "Cloud PC Setup (Windows / macOS)"

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows
      CODE:
        description: "[Windows] Full headless CRD command (CMD version)"
        required: false
        default: ""
      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"
      RUSTDESK_PASSWORD:
        description: "[macOS] Permanent RustDesk password"
        required: false
        default: "Shawon63@"

concurrency:
  group: cloud-pc-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # WINDOWS JOB (Fully Automated MostLogin)
  # ==========================================
  windows-crd-setup:
    name: "🚀 Windows 2022 CRD Runner"
    if: github.event.inputs.os_choice == 'Windows'
    runs-on: windows-2022
    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: "🛑 Verify Inputs"
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAW_CODE)) {
            Write-Error "❌ Missing CRD Code!"
            exit 1
          }

      - name: "🔊 Enable Audio"
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv

      - name: "🔧 Install CRD & Virtual Audio"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          if (-not (Test-Path $userDownloads)) { New-Item -ItemType Directory -Path $userDownloads | Out-Null }
          
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi" -UseBasicParsing
          Invoke-WebRequest -Uri "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack45.zip" -OutFile "$userDownloads\VBCABLE.zip" -UseBasicParsing
          Expand-Archive -Path "$userDownloads\VBCABLE.zip" -DestinationPath "$userDownloads\VBCABLE" -Force
          Start-Process -Wait -FilePath "$userDownloads\VBCABLE\VBCABLE_Setup_x64.exe" -ArgumentList "-i", "-h" -Verb RunAs
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"

      - name: "🕵️‍♂️ Silent Install & Launch MostLogin"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          $mlInstaller = "$userDownloads\MostLogin-setup.exe"
          
          Write-Host "Downloading MostLogin..."
          Invoke-WebRequest -Uri "https://downsoft.mostlogin.com/MostLogin-setup.exe" -OutFile $mlInstaller -UseBasicParsing
          
          Write-Host "Performing Silent Installation..."
          Start-Process -FilePath $mlInstaller -ArgumentList "/S" -Wait
          
          Write-Host "Launching MostLogin..."
          $mlPath = "C:\Program Files (x86)\MostLogin\MostLogin.exe"
          if (Test-Path $mlPath) {
              Start-Process -FilePath $mlPath
          } else {
              $altPath = "$env:LocalAppData\Programs\MostLogin\MostLogin.exe"
              if (Test-Path $altPath) { Start-Process -FilePath $altPath }
          }

      - name: "🌟 Start Chrome Remote Desktop"
        run: |
          cmd.exe /c "$env:RAW_CODE --pin=$env:PIN_INPUT"

      - name: "⏳ Keep Alive"
        run: |
          Write-Host "✅ Windows PC Ready. MostLogin should be launched!"
          while ($true) { Start-Sleep -Seconds 300 }

  # ==========================================
  # MACOS JOB (Clean Install)
  # ==========================================
  macos-setup:
    name: "🍏 macOS Remote Runner"
    if: github.event.inputs.os_choice == 'macOS'
    runs-on: macos-15
    steps:
      - name: "🔓 Create Admin"
        run: sudo sysadminctl -addUser macadmin -fullName "Mac Admin" -password "CloudPC123!" -admin

      - name: "🚫 System Prep"
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          curl -L -o /Users/runner/wallpaper.jpg "https://images.unsplash.com/photo-1506744626753-dba37c2a9816?q=80&w=2560"
          osascript -e 'tell application "Finder" to set desktop picture to POSIX file "/Users/runner/wallpaper.jpg"'

      - name: "🖥️ Install Remote Tools"
        run: |
          brew install --cask --no-quarantine rustdesk
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg
          sudo hdiutil attach /tmp/crd.dmg -nobrowse
          CRD_VOL=$(find /Volumes -maxdepth 1 -name "Chrome Remote Desktop*" | head -1)
          CRD_PKG=$(find "$CRD_VOL" -name "*.pkg" | head -1)
          sudo installer -pkg "$CRD_PKG" -target /
          sudo hdiutil detach "$CRD_VOL" -force

      - name: "🕵️‍♂️ Install Browsers"
        run: |
          curl -L -o /tmp/mostlogin.dmg "https://downsoft.mostlogin.com/MostLogin-x64-setup.dmg"
          MOUNT_ML=$(sudo hdiutil attach /tmp/mostlogin.dmg -nobrowse | grep -o '/Volumes/.*' | head -n 1)
          sudo cp -R "$MOUNT_ML"/*.app /Applications/ || true

      - name: "🔐 Set RustDesk Permanent Password"
        env:
          RD_PASSWORD: ${{ github.event.inputs.RUSTDESK_PASSWORD }}
        run: |
          CONFIG_DIR="$HOME/Library/Application Support/com.rustdesk.RustDesk"
          mkdir -p "$CONFIG_DIR"

          # Step 1: Launch RustDesk briefly to generate device ID and base config
          echo "Step 1: Initializing RustDesk (generating device ID)..."
          open /Applications/RustDesk.app
          sleep 30
          pkill -9 -f "RustDesk" 2>/dev/null || true
          sleep 3

          # Step 2: Install bcrypt and write password hash + config directly via Python
          echo "Step 2: Writing bcrypt password hash directly to config..."
          pip3 install bcrypt --quiet
          python3 -c "
import os, re, bcrypt
pwd = os.environ.get('RD_PASSWORD', '').encode()
hashed = bcrypt.hashpw(pwd, bcrypt.gensalt()).decode()
config_path = os.path.expanduser('~/Library/Application Support/com.rustdesk.RustDesk/RustDesk2.toml')

if os.path.exists(config_path):
    content = open(config_path).read()
else:
    content = ''

# Inject or replace password field at top level
if re.search(r'^password\s*=', content, re.MULTILINE):
    content = re.sub(r'^password\s*=.*', 'password = \"' + hashed + '\"', content, flags=re.MULTILINE)
    print('Updated password hash')
else:
    content = 'password = \"' + hashed + '\"\n' + content
    print('Prepended password hash')

# Inject or replace verification-method under [options]
vm = 'verification-method = \"use-permanent-password\"'
if 'verification-method' in content:
    content = re.sub(r'verification-method\s*=\s*\"[^\"]*\"', vm, content)
    print('Updated verification-method')
elif '[options]' in content:
    content = content.replace('[options]', '[options]\n' + vm, 1)
    print('Inserted verification-method under [options]')
else:
    content += '\n[options]\n' + vm + '\n'
    print('Appended [options] section with verification-method')

open(config_path, 'w').write(content)
print('Config saved: ' + config_path)
"
          echo "Password hash written successfully."

      - name: "🚀 Relaunch RustDesk & Get ID"
        env:
          RD_PASSWORD: ${{ github.event.inputs.RUSTDESK_PASSWORD }}
        run: |
          CONFIG_FILE="$HOME/Library/Application Support/com.rustdesk.RustDesk/RustDesk2.toml"

          # Phase 5 - Relaunch RustDesk with permanent password active
          echo "Phase 5: Relaunching RustDesk..."
          open /Applications/RustDesk.app
          sleep 25

          # Extract ID from config (avoids spawning a second instance via --get-id)
          RD_ID=$(grep -oE 'id\s*=\s*"[0-9]+"' "$CONFIG_FILE" 2>/dev/null \
                  | grep -oE '[0-9]+' | head -1 || echo "check-screenshot")
          echo "RD_ID=${RD_ID}" >> $GITHUB_ENV

          echo "================================================"
          echo "  RustDesk ID       : ${RD_ID}"
          echo "  Password (FIXED)  : $RD_PASSWORD"
          echo "  Reconnect anytime : password won't change"
          echo "================================================"

      - name: "📸 Capture RustDesk Screenshot"
        run: |
          screencapture -x /tmp/rustdesk-id.png
          IMAGE_URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/rustdesk-id.png" https://catbox.moe/user/api.php)
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: "⏳ Connection Window"
        run: |
          echo "=============================================="
          echo " 📸 Screenshot : ${{ env.IMAGE_URL }}"
          echo " 🖥️ RustDesk ID: ${{ env.RD_ID }}"
          echo " 🔑 Password   : ${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          echo "=============================================="
          while true; do sleep 3600; done
